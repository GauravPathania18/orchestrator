events {
    worker_connections 1024;
}

http {
    upstream embedder {
        server embedder:8000;
    }
    
    upstream vector-storage {
        server vector-storage:8001;
    }
    
    upstream backend {
        server backend:8002;
    }

    server {
        listen 80;
        server_name localhost;

        # Embedder service routes
        location /embed {
            proxy_pass http://embedder;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Vector storage service routes
        location /vectors {
            proxy_pass http://vector-storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API routes
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check endpoints
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
