services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - llm-network

  # Embedder Service
  embedder:
    build:
      context: .
      dockerfile: Dockerfile
      target: embedder
    container_name: embedder
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/embedder
      - EMBEDDER_MODEL=all-MiniLM-L6-v2
    volumes:
      - ./personal_LLM_embedder:/app/embedder
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - llm-network

  # Vector Storage Service
  vector-storage:
    build:
      context: .
      dockerfile: Dockerfile
      target: vector-storage
    container_name: vector-storage
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app/vector-storage
      - PERSIST_DIR=./chroma_store
      - COLLECTION_NAME=personal_llm
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDER_URL=http://embedder:8000/embed
    volumes:
      - chroma_data:/app/vector-storage/chroma_store
      - ./VECTOR_STORAGE_SERVICE:/app/vector-storage
    depends_on:
      - embedder
      - ollama
    restart: unless-stopped
    networks:
      - llm-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: backend
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app/backend
      - EMBEDDER_URL=http://embedder:8000/embed
      - VECTOR_STORE_URL=http://vector-storage:8001
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./Backend:/app/backend
    depends_on:
      - embedder
      - vector-storage
      - ollama
    restart: unless-stopped
    networks:
      - llm-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - embedder
      - vector-storage
      - backend
    restart: unless-stopped
    networks:
      - llm-network

volumes:
  ollama_data:
    driver: local
  chroma_data:
    driver: local

networks:
  llm-network:
    driver: bridge
